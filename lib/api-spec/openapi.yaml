  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List all announcements
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create an announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementBody"
      responses:
        "201":
          description: Created announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}:
    put:
      operationId: updateAnnouncement
      tags: [announcements]
      summary: Update an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementBody"
      responses:
        "200":
          description: Updated announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ─── Dashboard ───────────────────────────────────────────────
    DashboardStats:
      type: object
      properties:
        totalStudents:
          type: integer
        totalFaculty:
          type: integer
        totalCourses:
          type: integer
        totalDepartments:
          type: integer
        activeEnrollments:
          type: integer
        pendingFees:
          type: number
        upcomingExams:
          type: integer
        averageGpa:
          type: number
      required:
        - totalStudents
        - totalFaculty
        - totalCourses
        - totalDepartments
        - activeEnrollments
        - pendingFees
        - upcomingExams
        - averageGpa

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [enrollment, grade, payment, announcement, exam, student, faculty]
        title:
          type: string
        description:
          type: string
        timestamp:
          type: string
      required: [id, type, title, description, timestamp]

    EnrollmentTrend:
      type: object
      properties:
        semester:
          type: string
        enrollments:
          type: integer
        year:
          type: integer
      required: [semester, enrollments, year]

    DepartmentStat:
      type: object
      properties:
        departmentName:
          type: string
        studentCount:
          type: integer
        courseCount:
          type: integer
        facultyCount:
          type: integer
      required: [departmentName, studentCount, courseCount, facultyCount]

    # ─── Student ─────────────────────────────────────────────────
    Student:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        dateOfBirth:
          type: string
        gender:
          type: string
          enum: [male, female, other]
        nationality:
          type: string
        address:
          type: string
        departmentId:
          type: integer
        departmentName:
          type: string
        enrollmentYear:
          type: integer
        status:
          type: string
          enum: [active, inactive, graduated, suspended]
        gpa:
          type: number
        createdAt:
          type: string
      required:
        - id
        - studentId
        - firstName
        - lastName
        - email
        - departmentId
        - enrollmentYear
        - status

    CreateStudentBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        dateOfBirth:
          type: string
        gender:
          type: string
          enum: [male, female, other]
        nationality:
          type: string
        address:
          type: string
        departmentId:
          type: integer
        enrollmentYear:
          type: integer
        status:
          type: string
          enum: [active, inactive, graduated, suspended]
      required: [firstName, lastName, email, departmentId, enrollmentYear, status]

    # ─── Course ──────────────────────────────────────────────────
    Course:
      type: object
      properties:
        id:
          type: integer
        courseCode:
          type: string
        name:
          type: string
        description:
          type: string
        credits:
          type: integer
        departmentId:
          type: integer
        departmentName:
          type: string
        facultyId:
          type: integer
        facultyName:
          type: string
        maxStudents:
          type: integer
        enrolledCount:
          type: integer
        semester:
          type: string
        level:
          type: string
          enum: [undergraduate, graduate, doctoral]
        createdAt:
          type: string
      required:
        - id
