          description: Created faculty member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacultyMember"

  /faculty/{id}:
    get:
      operationId: getFaculty
      tags: [faculty]
      summary: Get a faculty member by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Faculty member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacultyMember"
    put:
      operationId: updateFaculty
      tags: [faculty]
      summary: Update a faculty member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFacultyBody"
      responses:
        "200":
          description: Updated faculty member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacultyMember"
    delete:
      operationId: deleteFaculty
      tags: [faculty]
      summary: Delete a faculty member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── DEPARTMENTS ──────────────────────────────────────────────
  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
