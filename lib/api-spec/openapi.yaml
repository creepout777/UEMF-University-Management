  # ─── EXAMS ────────────────────────────────────────────────────
  /exams:
    get:
      operationId: listExams
      tags: [exams]
      summary: List all exams
      parameters:
        - name: courseId
          in: query
          schema:
            type: integer
        - name: semester
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of exams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exam"
    post:
      operationId: createExam
      tags: [exams]
      summary: Create an exam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExamBody"
      responses:
        "201":
          description: Created exam
          content:
