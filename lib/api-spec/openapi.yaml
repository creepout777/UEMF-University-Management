  # ─── FEES ─────────────────────────────────────────────────────
  /fees:
    get:
      operationId: listFees
      tags: [fees]
      summary: List fee records
      parameters:
        - name: studentId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, paid, overdue, waived]
      responses:
        "200":
          description: List of fees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fee"
    post:
      operationId: createFee
      tags: [fees]
      summary: Create a fee record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeeBody"
      responses:
        "201":
          description: Created fee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fee"

  /fees/{id}:
    put:
      operationId: updateFee
      tags: [fees]
      summary: Update a fee record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeeBody"
      responses:
